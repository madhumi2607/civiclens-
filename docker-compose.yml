version: '3.9'

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - '5173:5173'
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - server
    networks:
      - civiclens

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - '3001:3001'
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://civiclens:civiclens@db:5432/civiclens
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
    networks:
      - civiclens

  db:
    image: postgis/postgis:15-3.3
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: civiclens
      POSTGRES_PASSWORD: civiclens
      POSTGRES_DB: civiclens
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U civiclens']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - civiclens

volumes:
  pgdata:

networks:
  civiclens:
    driver: bridge
